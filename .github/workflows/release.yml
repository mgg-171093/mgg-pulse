name: Release

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - ".github/scripts/**"
      - "app/Directory.Build.props"
      - "app/MGG.Pulse.slnx"
      - "app/src/**"
      - "app/tests/**"
      - "app/build/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - ".github/scripts/**"
      - "app/Directory.Build.props"
      - "app/MGG.Pulse.slnx"
      - "app/src/**"
      - "app/tests/**"
      - "app/build/**"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-readiness:
    name: Release readiness validation (PR -> main)
    if: github.event_name == 'pull_request'
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Validate version bump contract (dry-run)
        shell: pwsh
        run: pwsh -File .github/scripts/bump-version.ps1 -PropsPath app/Directory.Build.props -DryRun

      - name: Restore
        run: dotnet restore app/MGG.Pulse.slnx

      - name: Build
        run: dotnet build app/MGG.Pulse.slnx --configuration Release --no-restore

      - name: Test (CI-safe only)
        run: dotnet test app/tests/MGG.Pulse.Tests.Core/MGG.Pulse.Tests.Core.csproj --configuration Release --no-build

      - name: Acquire Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          if ($LASTEXITCODE -ne 0) {
            Write-Warning "Chocolatey failed. Falling back to direct Inno Setup installer download."
            $installer = Join-Path $env:RUNNER_TEMP "innosetup-6.4.3.exe"
            Invoke-WebRequest -Uri "https://files.jrsoftware.org/is/6/innosetup-6.4.3.exe" -OutFile $installer
            Start-Process -FilePath $installer -ArgumentList "/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART" -Wait
          }

      - name: Validate packaging path (dry-run)
        shell: pwsh
        run: ./app/build/build.ps1 -SkipIco

      - name: Validate publish contract (dry-run)
        shell: pwsh
        run: |
          $next = pwsh -File .github/scripts/bump-version.ps1 -PropsPath app/Directory.Build.props -DryRun | ConvertFrom-Json
          $installer = Resolve-Path "app/build/output/MGGPulse-Setup-$($next.version).exe"
          pwsh -File .github/scripts/publish-release.ps1 -Version $next.version -Tag $next.tag -InstallerPath $installer -Repo "${{ github.repository }}" -CommitSha "${{ github.sha }}" -LatestPath app/build/latest.json -PropsPath app/Directory.Build.props -DryRun

  release:
    name: Continuous delivery (push -> main)
    if: github.event_name == 'push' && github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip release]')
    runs-on: windows-latest
    permissions:
      contents: write

    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Bump patch version
        id: bump
        shell: pwsh
        run: pwsh -File .github/scripts/bump-version.ps1 -PropsPath app/Directory.Build.props

      - name: Restore
        run: dotnet restore app/MGG.Pulse.slnx

      - name: Build
        run: dotnet build app/MGG.Pulse.slnx --configuration Release --no-restore

      - name: Test (CI-safe only)
        run: dotnet test app/tests/MGG.Pulse.Tests.Core/MGG.Pulse.Tests.Core.csproj --configuration Release --no-build

      - name: Acquire Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          if ($LASTEXITCODE -ne 0) {
            Write-Warning "Chocolatey failed. Falling back to direct Inno Setup installer download."
            $installer = Join-Path $env:RUNNER_TEMP "innosetup-6.4.3.exe"
            Invoke-WebRequest -Uri "https://files.jrsoftware.org/is/6/innosetup-6.4.3.exe" -OutFile $installer
            Start-Process -FilePath $installer -ArgumentList "/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART" -Wait
          }

      - name: Build installer
        shell: pwsh
        run: ./app/build/build.ps1 -SkipIco -Version "${{ steps.bump.outputs.version }}"

      - name: Publish release atomically
        shell: pwsh
        run: |
          $installerPath = Resolve-Path "app/build/output/MGGPulse-Setup-${{ steps.bump.outputs.version }}.exe"
          pwsh -File .github/scripts/publish-release.ps1 -Version "${{ steps.bump.outputs.version }}" -Tag "${{ steps.bump.outputs.tag }}" -InstallerPath $installerPath -Repo "${{ github.repository }}" -CommitSha "${{ github.sha }}" -LatestPath app/build/latest.json -PropsPath app/Directory.Build.props
