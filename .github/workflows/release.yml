name: Release

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "app/Directory.Build.props"
      - "app/MGG.Pulse.slnx"
      - "app/src/**"
      - "app/tests/**"
      - "app/build/**"
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-readiness:
    name: Release readiness validation (PR -> main)
    if: github.event_name == 'pull_request'
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Validate semver bump logic (dry-run)
        shell: pwsh
        run: |
          [xml]$props = Get-Content -Path "app/Directory.Build.props"
          $current = [Version]$props.Project.PropertyGroup.Version
          $next = [Version]::new($current.Major, $current.Minor, $current.Build + 1)
          Write-Host "Current version: $($current.ToString())"
          Write-Host "Next release version: $($next.ToString())"

      - name: Restore
        run: dotnet restore app/MGG.Pulse.slnx

      - name: Build
        run: dotnet build app/MGG.Pulse.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test app/tests/MGG.Pulse.Tests.Unit/MGG.Pulse.Tests.Unit.csproj --configuration Release --no-build

      - name: Validate installer generation path (no publishing)
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          ./app/build/build.ps1 -SkipIco

  release:
    name: Continuous delivery (push -> main)
    if: github.event_name == 'push' && github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip release]')
    runs-on: windows-latest
    permissions:
      contents: write

    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Bump patch version in Directory.Build.props
        id: bump
        shell: pwsh
        run: |
          [xml]$props = Get-Content -Path "app/Directory.Build.props"
          $current = [Version]$props.Project.PropertyGroup.Version
          $next = [Version]::new($current.Major, $current.Minor, $current.Build + 1)

          $props.Project.PropertyGroup.Version = $next.ToString()
          $props.Project.PropertyGroup.AssemblyVersion = "{0}.{1}.{2}.0" -f $next.Major, $next.Minor, $next.Build
          $props.Project.PropertyGroup.FileVersion = "{0}.{1}.{2}.0" -f $next.Major, $next.Minor, $next.Build
          $props.Save((Resolve-Path "app/Directory.Build.props"))

          "new_version=$($next.ToString())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "tag=v$($next.ToString())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Restore
        run: dotnet restore app/MGG.Pulse.slnx

      - name: Build
        run: dotnet build app/MGG.Pulse.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test app/tests/MGG.Pulse.Tests.Unit/MGG.Pulse.Tests.Unit.csproj --configuration Release --no-build

      - name: Build installer
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          ./app/build/build.ps1 -SkipIco -Version "${{ steps.bump.outputs.new_version }}"

      - name: Compute installer SHA-256 and release metadata
        id: metadata
        shell: pwsh
        run: |
          $version = "${{ steps.bump.outputs.new_version }}"
          $tag = "${{ steps.bump.outputs.tag }}"
          $installerName = "MGGPulse-Setup-$version.exe"
          $installerPath = Resolve-Path "app/build/output/$installerName"
          $sha256 = (Get-FileHash -Path $installerPath -Algorithm SHA256).Hash.ToLowerInvariant()
          $downloadUrl = "https://github.com/${{ github.repository }}/releases/download/$tag/$installerName"

          "installer_path=$installerPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "installer_name=$installerName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "sha256=$sha256" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "download_url=$downloadUrl" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Create GitHub release and upload installer
        shell: pwsh
        run: |
          $tag = "${{ steps.bump.outputs.tag }}"
          $version = "${{ steps.bump.outputs.new_version }}"
          $installerPath = "${{ steps.metadata.outputs.installer_path }}"

          gh release create $tag $installerPath --title "MGG Pulse $tag" --target "${{ github.sha }}" --notes "Automated release for MGG Pulse $version."

      - name: Update latest.json (raw-main model)
        shell: pwsh
        run: |
          $latestPath = "app/build/latest.json"
          $version = "${{ steps.bump.outputs.new_version }}"
          $url = "${{ steps.metadata.outputs.download_url }}"
          $sha = "${{ steps.metadata.outputs.sha256 }}"

          $latest = Get-Content -Path $latestPath -Raw | ConvertFrom-Json
          $latest.version = $version
          $latest.url = $url
          $latest.sha256 = $sha
          $latest.notes = "Automated release via GitHub Actions."
          $latest | ConvertTo-Json -Depth 10 | Set-Content -Path $latestPath -Encoding utf8

      - name: Commit and push release metadata
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/Directory.Build.props app/build/latest.json
          git commit -m "chore(release): publish metadata for ${{ steps.bump.outputs.tag }} [skip ci] [skip release]"
          git push origin main
